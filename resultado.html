<script>
const params = new URLSearchParams(window.location.search);

// 🔒 VALIDAÇÃO
if (!params.has("q1")) {
  document.body.innerHTML = "<h1 style='color:white;text-align:center'>Acesso inválido</h1>";
  throw new Error("Sem respostas");
}

// 📊 RESPOSTAS
const answers = [];
for (let i = 1; i <= 15; i++) {
  answers.push(Number(params.get(`q${i}`) || 0));
}

const total = answers.reduce((a,b)=>a+b,0);

// 👤 DADOS DO USUÁRIO
const nome = params.get("nome") || "Não informado";
const email = params.get("email") || "Não informado";
const telefone = params.get("telefone") || "Não informado";
const empresa = params.get("empresa") || "Não informado";

// 🎯 STAGE
function getStage(score){
  if(score <= 20) return "Empresa desorganizada";
  if(score <= 40) return "Empresa em estruturação";
  return "Empresa estruturada";
}

// 📦 PLANO
function getPlan(score){
  if(score <= 20) return "Plano Essencial";
  if(score <= 40) return "Plano Estratégico";
  return "Plano Acompanhamento";
}

// 🧠 RESULTADO
const stage = getStage(total);
const plan = getPlan(total);

// UI
document.getElementById("scoreBadge").textContent = `Pontuação: ${total}/60`;
document.getElementById("stageTitle").textContent = stage;
document.getElementById("planTitle").textContent = plan;

// 📩 ENVIO REAL
async function enviar() {
  const data = {
    access_key: "3e2ac5c8-6daa-476d-bd65-72e5b79cb947",
    subject: "Novo diagnóstico Telluna",
    name: nome,
    email: email,
    message: `
Nome: ${nome}
Empresa: ${empresa}
Telefone: ${telefone}

Pontuação: ${total}
Estágio: ${stage}
Plano: ${plan}

Respostas: ${answers.join(",")}
    `
  };

  await fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
}

enviar();
</script>
