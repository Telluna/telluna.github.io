<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Resultado do Diagnóstico - Telluna</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f3d2e, #0a2c22);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .nivel {
      font-size: 26px;
      font-weight: bold;
      color: #d4af37;
    }

    .erros {
      text-align: left;
      margin-top: 15px;
    }

    .erros li {
      margin-bottom: 8px;
    }

    .cta {
      display: inline-block;
      margin-top: 30px;
      padding: 18px 40px;
      background: #d4af37;
      color: #0f3d2e;
      font-weight: bold;
      font-size: 18px;
      border-radius: 10px;
      text-decoration: none;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Seu diagnóstico estratégico</h1>

  <div class="card">
    <div id="nivel" class="nivel"></div>
  </div>

  <div class="card">
    <h3>Pontos de atenção</h3>
    <ul id="erros" class="erros"></ul>
  </div>

  <div class="card">
    <h3>Plano recomendado</h3>
    <p id="plano"></p>
  </div>

  <a class="cta" href="https://wa.me/5516993735556">
    Solicite sua consultoria
  </a>

</div>

<script>
  function getParams() {
    const params = new URLSearchParams(window.location.search);
    let respostas = [];

    for (let i = 1; i <= 20; i++) {
      let val = parseInt(params.get("q" + i)) || 0;
      respostas.push(val);
    }

    return respostas;
  }

  function calcularResultado() {
    const respostas = getParams();
    const total = respostas.reduce((a, b) => a + b, 0);

    let nivel = "";
    let plano = "";
    let erros = [];

    if (total <= 20) {
      nivel = "Nível 1 - Empresa desorganizada";
      plano = "Plano Essencial";
      erros = [
        "Falta de clareza nas decisões",
        "Gestão baseada em improviso",
        "Ausência de indicadores",
        "Dependência total do dono"
      ];
    }

    else if (total <= 40) {
      nivel = "Nível 2 - Estrutura inicial";
      plano = "Plano Estratégico";
      erros = [
        "Processos pouco definidos",
        "Indicadores inconsistentes",
        "Decisão sem padrão claro",
        "Falta de rotina de gestão"
      ];
    }

    else {
      nivel = "Nível 3 - Gestão estruturada";
      plano = "Plano de Acompanhamento";
      erros = [
        "Ajustes finos de estratégia",
        "Escala com controle",
        "Refinamento de indicadores",
        "Aprimorar tomada de decisão"
      ];
    }

    document.getElementById("nivel").innerText = nivel;
    document.getElementById("plano").innerText = plano;

    const lista = document.getElementById("erros");
    erros.forEach(e => {
      let li = document.createElement("li");
      li.innerText = e;
      lista.appendChild(li);
    });

    // Simulação envio (GitHub não envia email direto)
    console.log("Respostas enviadas:", respostas);
  }

  calcularResultado();
</script>

</body>
</html>
